version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupath-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - models_cache:/app/models   # persist trained .pkl files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edupath-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupath-streamlit
    env_file: ./backend/.env
    command: streamlit run streamlit_demo.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - models_cache:/app/models
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  models_cache:
